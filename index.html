<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Викторина по ИВТ</title>
    <meta
      name="description"
      content="Интерактивная командная викторина по информатике"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Russo+One&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <button id="btn-fullscreen" class="btn btn-ghost" style="position: fixed; top: 24px; right: 24px; z-index: 9999; font-size: 24px; width: 48px; height: 48px; padding: 0; display: flex; align-items: center; justify-content: center; border-radius: 50%;" title="Полноэкранный/Оконный режим">
      ⛶
    </button>

    <!-- ═══════════════════════════════════════════════════
       ЭКРАН 1: ГЛАВНОЕ МЕНЮ
  ═══════════════════════════════════════════════════ -->
    <div id="screen-menu" class="screen active">
      <div class="stars" id="stars"></div>
      <div class="menu-content">
        <div class="menu-logo">
          <span class="logo-icon">🖥️</span>
          <h1 class="menu-title">Викторина</h1>
          <p class="menu-subtitle">по информатике</p>
        </div>
        <button id="btn-start-setup" class="btn btn-primary btn-glow">
          <span>Начать</span>
          <span class="btn-arrow">→</span>
        </button>
        <div class="menu-decoration">
          <span>01001001 01010110 01010100</span>
        </div>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════════════
       ЭКРАН 2: НАСТРОЙКА (количество команд + имена)
  ═══════════════════════════════════════════════════ -->
    <div id="screen-setup" class="screen">
      <div class="setup-container">
        <button id="btn-back-to-menu" class="btn btn-ghost btn-back">
          ← Назад
        </button>
        <h2 class="setup-title">Настройка игры</h2>

        <div class="setup-card" id="card-count">
          <label class="setup-label" for="team-count-input">
            <span class="label-icon">👥</span>
            Количество команд:
          </label>
          <div class="count-input-wrap">
            <button
              class="count-btn"
              id="btn-count-minus"
              aria-label="Уменьшить"
            >
              −
            </button>
            <input
              type="number"
              id="team-count-input"
              class="count-input"
              min="1"
              max="8"
              value="2"
              placeholder="2"
            />
            <button
              class="count-btn"
              id="btn-count-plus"
              aria-label="Увеличить"
            >
              +
            </button>
          </div>
        </div>

        <div class="setup-card" id="card-timer">
          <label class="setup-label" for="timer-input">
            <span class="label-icon">⏱️</span>
            Время на ответ (сек):
            <span style="font-size: 13px; font-weight:normal; margin-left:8px; color:var(--text-muted);">(0 - без таймера)</span>
          </label>
          <div class="count-input-wrap">
            <button
              class="count-btn"
              id="btn-timer-minus"
              aria-label="Уменьшить"
            >
              −
            </button>
            <input
              type="number"
              id="timer-input"
              class="count-input"
              min="0"
              max="300"
              value="15"
              oninput="this.value = this.value.replace(/[^0-9]/g, '')"
            />
            <button
              class="count-btn"
              id="btn-timer-plus"
              aria-label="Увеличить"
            >
              +
            </button>
          </div>
        </div>

        <div id="teams-list" class="teams-list"></div>

        <button
          id="btn-start-game"
          class="btn btn-primary btn-glow"
          style="display: none"
        >
          <span>Начать игру!</span>
          <span class="btn-arrow">🚀</span>
        </button>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════════════
       ЭКРАН 3: ИГРОВОЕ ПОЛЕ (таблица вопросов)
  ═══════════════════════════════════════════════════ -->
    <div id="screen-game" class="screen">
      <div class="game-header">
        <h2 class="game-title">🖥️ Викторина по ИВТ</h2>
      </div>

      <div class="game-content-area">
        <div id="scoreboard-left" class="scoreboard-side"></div>
        
        <div class="board-column">
          <div class="board-wrap">
            <table class="question-board" id="question-board">
              <!-- Заполняется JS -->
            </table>
          </div>
          <div class="board-controls">
            <button id="btn-end-game" class="btn btn-ghost btn-end-game" title="Завершить игру">🛑 Завершить игру</button>
          </div>
        </div>

        <div id="scoreboard-right" class="scoreboard-side"></div>
      </div>

      <div class="current-team-bar" id="current-team-bar">
        <span class="turn-label">Ход команды: </span><span id="current-team-name">—</span>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════════════
       МОДАЛЬНОЕ ОКНО: ВОПРОС
  ═══════════════════════════════════════════════════ -->
    <div id="modal-question" class="modal-overlay" aria-hidden="true">
      <div class="modal-box question-modal" style="position: relative;">
        <button id="btn-cancel-question" class="btn-close-corner" title="Отменить выбор (случайный клик)">&times;</button>
        <div class="modal-header">
          <span id="modal-category" class="modal-category"></span>
          <span id="modal-points-badge" class="modal-points-badge"></span>
        </div>
        <p id="modal-question-text" class="modal-question-text"></p>

        <div id="timer-container" class="timer-container" style="display: none;">
          <div class="timer-bar-wrap">
            <div id="timer-bar" class="timer-bar"></div>
          </div>
          <div id="timer-text" class="timer-text">15</div>
        </div>

        <div id="answer-section" class="answer-section">
          <div id="options-grid" class="options-grid">
            <!-- Варианты ответов — заполняется JS -->
          </div>
          <div
            id="answer-result"
            class="answer-result"
            style="display: none"
          ></div>
        </div>

        <div id="answer-reveal" class="answer-reveal" style="display: none">
          <p class="reveal-label">Правильный ответ:</p>
          <p id="reveal-text" class="reveal-text"></p>
        </div>

        <div class="modal-actions">
          <button
            id="btn-correct"
            class="btn btn-correct"
            style="display: none"
          >
            ✅ Верно (+очки)
          </button>
          <button id="btn-wrong" class="btn btn-wrong" style="display: none">
            ❌ Неверно (0)
          </button>
          <button
            id="btn-close-modal"
            class="btn btn-ghost"
            style="display: none"
          >
            Закрыть
          </button>
        </div>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════════════
       МОДАЛЬНОЕ ОКНО: РЕДАКТИРОВАНИЕ ОЧКОВ
  ═══════════════════════════════════════════════════ -->
    <div id="modal-score-edit" class="modal-overlay" aria-hidden="true">
      <div class="modal-box score-edit-modal" style="position: relative; max-width: 400px; text-align: center;">
        <button id="btn-close-score-edit" class="btn-close-corner">&times;</button>
        <h3 style="font-family: 'Russo One', sans-serif; font-size: 24px; color: var(--accent-2); margin-top: 8px;">Изменить очки</h3>
        <p id="score-edit-team-name" style="font-weight: 700; font-size: 18px; margin: 8px 0 20px;">Команда</p>
        
        <div class="count-input-wrap" style="justify-content: center; margin-bottom: 24px;">
          <input type="number" id="score-edit-input" class="count-input" value="10" min="1" max="999" />
        </div>
        
        <div class="modal-actions">
          <button id="btn-score-add" class="btn btn-correct">➕ Прибавить</button>
          <button id="btn-score-sub" class="btn btn-wrong">➖ Отнять</button>
        </div>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════════════
       МОДАЛЬНОЕ ОКНО: КОНЕЦ ИГРЫ
  ═══════════════════════════════════════════════════ -->
    <div id="modal-end" class="modal-overlay" aria-hidden="true">
      <div class="modal-box end-modal">
        <div class="end-trophy">🏆</div>
        <h2 class="end-title">Игра завершена!</h2>
        <div id="end-results" class="end-results"></div>
        <button id="btn-restart" class="btn btn-primary btn-glow">
          Вернуться в меню
        </button>
      </div>
    </div>

    <!-- Скрытые заглушки для обратной совместимости JS -->
    <button id="btn-check-answer" style="display:none;" aria-hidden="true"></button>
    <input id="answer-input" style="display:none;" aria-hidden="true" />

    <script src="script.js"></script>
  </body>
</html>
